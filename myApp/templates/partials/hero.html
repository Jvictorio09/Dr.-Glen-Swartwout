<!-- ===== SECTION 0: HERO ===== -->
<section
    class="relative z-[1] w-[calc(100%+8px)] max-w-none -ml-[4px] min-h-[86vh] sm:min-h-[88vh] lg:min-h-[90vh] flex items-center justify-center overflow-hidden [transform:translateZ(0)] [backface-visibility:hidden]"
    style="clip-path: url(#hero-bottom-scoop); -webkit-clip-path: url(#hero-bottom-scoop);">
    <!-- Clip definition: same curve as former SVG strip; hero image fills the visible shape -->
    <svg width="0" height="0" aria-hidden="true" class="absolute">
        <defs>
            <clipPath id="hero-bottom-scoop" clipPathUnits="objectBoundingBox">
                <!-- Same direction as original (center sags down); deeper bend than 0.92/0.97 -->
                <path d="M0,0 L1,0 L1,0.91 C0.75,0.99 0.25,0.99 0,0.91 Z"/>
            </clipPath>
        </defs>
    </svg>
    <!-- Background image: slight horizontal overdraw kills subpixel gaps next to clip-path / viewport edge -->
    <div class="absolute top-0 bottom-0 left-[-3px] w-[calc(100%+6px)] max-w-none">
        <img
            src="https://res.cloudinary.com/dcuswyfur/image/upload/v1774437110/Mask_group_xgkezx.png"
            alt=""
            class="absolute inset-0 h-full w-full object-cover"
            loading="eager"
            fetchpriority="high"
            decoding="async"
        >
    </div>
    
    <!-- Content Overlay: mobile/sm sizes unchanged; lg+ = smaller type + nudged down -->
    <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center pt-28 pb-24 sm:pt-32 sm:pb-28 lg:pt-32 lg:pb-28 lg:translate-y-12">
        <!-- Badge -->
        <div class="inline-flex items-center rounded-full border border-white/12 bg-black/25 px-5 py-2 mb-8 lg:px-5 lg:py-2 lg:mb-7 backdrop-blur-sm">
            <span class="text-[11px] sm:text-[12px] lg:text-[11px] lg:tracking-[0.18em] font-semibold tracking-[0.19em] uppercase text-white/90">
                The Paradigm Breaker
            </span>
        </div>
        
        <!-- Headline -->
        <h1 class="hero-headline text-[clamp(2.625rem,6.25vw,4.75rem)] lg:text-[clamp(2.125rem,3.35vw,3.375rem)] text-white mb-8 lg:mb-7 leading-[1.08]">
            Reverse the <span class="text-[#22D3EE]">"Irreversible."</span><br>
            Heal 12× faster than you age.
        </h1>
        
        <!-- CTAs -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-3.5 mt-8 lg:gap-3.5 lg:mt-7">
            <a href="#get-started"
               class="inline-flex items-center justify-center rounded-lg border border-white/70 bg-transparent px-8 py-3.5 text-[15px] font-medium text-white hover:bg-white/10 transition-colors duration-300 sm:py-4 lg:px-7 lg:py-3 lg:text-[14px]">
                Begin Accelerated Self Healing →
            </a>
            
            <a href="#how-it-works"
               class="inline-flex items-center justify-center rounded-lg bg-[#14B8A6] px-8 py-3.5 text-[15px] font-semibold text-white hover:bg-[#14B8A6] transition-colors duration-300 sm:py-4 lg:px-7 lg:py-3 lg:text-[14px]">
                See How Your Body Communicates →
            </a>
        </div>
    </div>
</section>
